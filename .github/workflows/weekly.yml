name: weekly-discord-bot

on:
  schedule:
    - cron: '0 11 * * 3'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node index.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          FORUM_CHANNEL_ID: ${{ secrets.FORUM_CHANNEL_ID }}